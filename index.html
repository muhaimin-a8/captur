<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captur Control Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 500px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; color: #333; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-value {
      font-size: 32px;
      font-weight: 600;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .btn {
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      font-size: 24px;
      cursor: pointer;
      background: #eee;
      color: #333;
      transition: all 0.2s;
    }
    .btn:hover { background: #ddd; }
    .btn:active { transform: scale(0.95); }
    .btn-large {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    .status-dot.stopped {
      background: #ef4444;
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .running { color: #22c55e; }
    .stopped { color: #ef4444; }
    .logs {
      max-height: 150px;
      overflow-y: auto;
      background: #1e1e1e;
      color: #aaa;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .logs div { padding: 2px 0; }
    .logs .time { color: #666; }
    .logs .info { color: #4ade80; }
    .logs .warn { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Captur Control Panel</h1>

    <div class="card">
      <div class="card-title">Capture Status</div>
      <div class="card-value">
        <span class="status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Running</span>
        </span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Interval (seconds)</div>
      <div class="card-value">
        <button class="btn" onclick="changeInterval(-1)">−</button>
        <span id="intervalValue">3</span>
        <button class="btn" onclick="changeInterval(1)">+</button>
      </div>
    </div>

    <div class="card">
      <button class="btn btn-large" id="toggleBtn" onclick="toggleCapture()">
        Stop Capture
      </button>
    </div>

    <div class="card">
      <div class="card-title">Recent Logs</div>
      <div class="logs" id="logs"></div>
    </div>
  </div>

  <script>
    let currentInterval = 3;
    let isRunning = true;

    function addLog(msg, type = 'info') {
      const logs = document.getElementById('logs');
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.innerHTML = `<span class="time">[${time}]</span> <span class="${type}">${msg}</span>`;
      logs.insertBefore(div, logs.firstChild);
      if (logs.children.length > 20) logs.lastChild.remove();
    }

    async function fetchJson(url, options = {}) {
      const res = await fetch(url, options);
      return res.json();
    }

    async function loadStatus() {
      try {
        const [capture, interval] = await Promise.all([
          fetchJson('/capture'),
          fetchJson('/interval')
        ]);
        isRunning = capture.running;
        currentInterval = interval.interval;
        updateUI();
      } catch (e) {
        addLog('Failed to load status', 'warn');
      }
    }

    function updateUI() {
      document.getElementById('intervalValue').textContent = currentInterval;
      document.getElementById('statusText').textContent = isRunning ? 'Running' : 'Stopped';
      document.getElementById('statusText').className = isRunning ? 'running' : 'stopped';
      document.getElementById('statusDot').className = isRunning ? '' : 'stopped';
      document.getElementById('toggleBtn').textContent = isRunning ? 'Stop Capture' : 'Start Capture';
      document.getElementById('toggleBtn').style.background = isRunning ? '#fee2e2' : '#dcfce7';
      document.getElementById('toggleBtn').style.color = isRunning ? '#dc2626' : '#16a34a';
    }

    async function changeInterval(delta) {
      const newVal = Math.max(1, currentInterval + delta);
      try {
        await fetchJson('/interval', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ interval: newVal })
        });
        currentInterval = newVal;
        updateUI();
        addLog(`Interval set to ${newVal}s`);
      } catch (e) {
        addLog('Failed to set interval', 'warn');
      }
    }

    async function toggleCapture() {
      try {
        const newState = !isRunning;
        await fetchJson('/capture', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ running: newState })
        });
        isRunning = newState;
        updateUI();
        addLog(`Capture ${newState ? 'started' : 'stopped'}`);
      } catch (e) {
        addLog('Failed to toggle capture', 'warn');
      }
    }

    loadStatus();
    setInterval(loadStatus, 2000);
  </script>
</body>
</html>
